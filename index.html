<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Conference Registration</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <img src="assets/logo.png" alt="Conference Logo" class="logo">
            <h1>Tech Future 2025 - Registration</h1>
            <p>Please fill out the form below to secure your spot!</p>
        </header>
        <main>
    <form class="registration-form">

      <!-- Personal Information -->
      <fieldset>
        <legend>Personal Information</legend>

        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>

        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>

        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
      </fieldset>

      <!-- Ticket Selection -->
      <fieldset>
        <legend>Ticket Details</legend>

        <label for="ticket-type">Select Ticket Type *</label>
        <select id="ticket-type" name="ticket-type" required>
          <option value="">--Select--</option>
          <option value="standard">Standard - $99</option>
          <option value="vip">VIP - $199</option>
          <option value="student">Student - $49</option>
        </select>

        <label>Meal Preference *</label>
        <div class="radio-group">
          <label><input type="radio" name="meal" value="veg" required> Vegetarian</label>
          <label><input type="radio" name="meal" value="nonveg"> Non-Vegetarian</label>
          <label><input type="radio" name="meal" value="vegan"> Vegan</label>
        </div>
      </fieldset>

      <!-- Additional -->
      <fieldset>
        <legend>Additional Information</legend>

        <label for="comments">Special Requests</label>
        <textarea id="comments" name="comments" rows="4" placeholder="Any special requirements?"></textarea>

        <div class="checkbox-group">
          <label><input type="checkbox" name="subscribe"> Subscribe to newsletter</label>
        </div>
      </fieldset>

      <!-- Submit -->
      <button type="submit" class="submit-btn">Register Now</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2025 Tech Future Conference. All rights reserved.</p>
  </footer>

    </body>
</html>
